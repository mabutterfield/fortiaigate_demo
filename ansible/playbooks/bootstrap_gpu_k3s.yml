---
- name: Bootstrap Ubuntu GPU host for k3s
  hosts: fortiaigate
  become: true
  pre_tasks:
    - name: Load environment and local group vars when present
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: >-
        {{
          query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/env.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/all.yml')
        }}
  roles:
    - common
    - nvidia_driver
    - k3s
    - nvidia_container_runtime
    - nvidia_device_plugin
    - nginx_ingress
    - validate_k3s
