---
- name: Bootstrap Ubuntu GPU host for k3s
  hosts: fortiaigate
  become: true
  pre_tasks:
    - name: Load local group vars when present
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: "{{ query('first_found', {'files': ['all.yml'], 'paths': [playbook_dir + '/../group_vars'], 'skip': True}) }}"
  roles:
    - common
    - nvidia_driver
    - k3s
    - nvidia_container_runtime
    - nvidia_device_plugin
