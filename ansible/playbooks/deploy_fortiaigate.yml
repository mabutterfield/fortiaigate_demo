---
- name: Deploy FortiAIGate on k3s
  hosts: fortiaigate
  become: true
  pre_tasks:
    - name: Load environment, generated, and local group vars when present
      ansible.builtin.include_vars:
        file: "{{ item }}"
      # Change note: Bedrock credentials are Terraform outputs entered manually in FortiAIGate, so no bedrock.generated.yml is loaded.
      loop: >-
        {{
          query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/env.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/images.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/all.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/system.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/terraform.generated.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/ecr.generated.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/ports.generated.yml')
          + query('ansible.builtin.fileglob', playbook_dir + '/../group_vars/user.yml')
        }}
  roles:
    - nginx_ingress
    - fortiaigate
