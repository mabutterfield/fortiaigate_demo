---
# Copy this file to env.yml and fill in environment-wide values shared by
# publish, bootstrap, deploy, status, and validation playbooks.
#
# For AWS deployments, scripts/automated_quickstart.py syncs aws_profile and
# aws_region here from terraform/common.tfvars. Keep these shared values here
# by default; use commented overrides in all.yml only for special local runs.
ansible_user: ubuntu
aws_profile: AdministratorAccess-123456789012
aws_region: us-east-1
faig_workspace_root: "{{ lookup('env', 'FAIG_WORKSPACE_ROOT') | default((playbook_dir + '/../../..') | realpath, true) }}"
registry_type: ecr
local_registry: localhost:5000
