---
# Legacy compatibility example.
#
# New AWS deployments get aws_profile/aws_region from generated
# ansible/group_vars/terraform.generated.yml. Put local-only overrides in
# ansible/group_vars/user.yml.
#
# Do not copy this file for new deployments. It remains only as a reference for
# older local workflows that still have ansible/group_vars/env.yml.
ansible_user: ubuntu
aws_profile: AdministratorAccess-123456789012
aws_region: us-east-1
faig_workspace_root: "{{ lookup('env', 'FAIG_WORKSPACE_ROOT') | default((playbook_dir + '/../../..') | realpath, true) }}"
registry_type: ecr
local_registry: localhost:5000
