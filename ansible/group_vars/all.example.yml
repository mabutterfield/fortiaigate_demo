---
# Copy this file to group_vars/all.yml and fill in environment-specific values.
ansible_user: ubuntu
aws_profile: AdministratorAccess-123456789012
aws_region: us-east-1
ecr_account_id: "123456789012"
ecr_registry: "{{ ecr_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
ecr_repo_prefix: fortiaigate
ecr_pull_secret_name: ecr-secret

fortiaigate_namespace: fortiaigate
fortiaigate_release_name: fortiaigate
# FortiAIGate deployment image tags from the original release archives.
#
# 8.0.0:
fortiaigate_version: "8.0.0"
fortiaigate_image_tag: "V8.0.0-build0024"
fortiaigate_triton_model_image_tag: "0.1.4"
fortiaigate_triton_image_tag: "25.11-onnx-trt-agt"
#
# 8.0.1:
# fortiaigate_version: "8.0.1"
# fortiaigate_image_tag: "V8.0.1-build0031"
# fortiaigate_triton_model_image_tag: "0.1.6-s1"
# fortiaigate_triton_image_tag: "25.11-onnx-trt-agt-s1"
faig_workspace_root: "{{ lookup('env', 'FAIG_WORKSPACE_ROOT') | default((playbook_dir + '/../../..') | realpath, true) }}"
faig_local_tmp_dir: "{{ faig_workspace_root }}/tmp"
fortiaigate_chart_path: "{{ faig_workspace_root }}/FAIG_helm/{{ fortiaigate_version }}/fortiaigate"
fortiaigate_chart_remote_root: "/home/{{ ansible_user }}/tmp/fortiaigate-chart"
fortiaigate_values_remote_path: "/home/{{ ansible_user }}/tmp/fortiaigate-values.yaml"
fortiaigate_post_renderer_remote_path: "/home/{{ ansible_user }}/tmp/fortiaigate-post-render.py"
fortiaigate_chart_archive_local_path: "{{ faig_local_tmp_dir }}/fortiaigate-chart.tgz"
fortiaigate_chart_archive_remote_path: "/home/{{ ansible_user }}/tmp/fortiaigate-chart.tgz"
fortiaigate_helm_wait: false
fortiaigate_helm_timeout: 20m

fortiaigate_image_repository: "{{ ecr_registry }}/{{ ecr_repo_prefix }}"
fortiaigate_image_pull_policy: IfNotPresent
fortiaigate_image_pull_secrets:
  - name: "{{ ecr_pull_secret_name }}"

# Image publishing defaults for ansible/playbooks/publish_images.yml.
# Prefer ansible/group_vars/images.yml for multiple builds.
image_tag: "{{ fortiaigate_image_tag }}"
image_archive: ""
image_archive_dir: /path/to/images/8.0.0
registry_type: ecr
local_registry: localhost:5000

publish_image_version: ""
publish_image_state: active

fortiaigate_update_strategy: Recreate
fortiaigate_storage_class: local-path
fortiaigate_storage_size: 16Gi
fortiaigate_storage_access_modes:
  - ReadWriteOnce

fortiaigate_ingress_class: nginx
fortiaigate_ingress_host: ""
fortiaigate_tls_enabled: true
fortiaigate_ssl_cert_path: "{{ fortiaigate_chart_path }}/files/certificate/dflt.crt"
fortiaigate_ssl_key_path: "{{ fortiaigate_chart_path }}/files/certificate/dflt.key"
fortiaigate_ssl_cert_chart_path: files/certificate/dflt.crt
fortiaigate_ssl_key_chart_path: files/certificate/dflt.key
# To use private TLS material, keep it outside this repo and override:
# fortiaigate_ssl_cert_path: /path/to/private/tls.crt
# fortiaigate_ssl_key_path: /path/to/private/tls.key

# Licenses are copied from this non-repo path into a temporary chart copy.
# Default expects FAIG/licenses next to FAIG_helm and fortiaigate_demo.
license_source_dir: "{{ faig_workspace_root }}/licenses"
# Single-node default: Ansible maps the first file to the discovered Kubernetes node name.
fortiaigate_license_files:
  - License1.lic

# Optional explicit mapping. Replace the key with the Kubernetes node name.
# fortiaigate_licenses:
#   ip-10-42-1-10.ec2.internal: License1.lic
fortiaigate_licenses: {}

ollama_base_url: http://10.11.41.201:11434/v1
ollama_model: llama3.2:1b
fortiaigate_status_verbose: false
# Optional display URL for status_fortiaigate.yml output. Defaults to fortiaigate_ingress_host or ansible_host.
fortiaigate_status_login_url_override: ""
validate_faig_ollama_forwarding: false
# Optional display URL for validate_faig.yml output. Defaults to fortiaigate_ingress_host or ansible_host.
validate_faig_login_url_override: ""

nvidia_driver_package: nvidia-driver-595-server
nvidia_utils_package: nvidia-utils-595-server
nvidia_device_plugin_manifest_url: https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.17.0/deployments/static/nvidia-device-plugin.yml
nvidia_runtime_class_name: nvidia

k3s_use_instance_store: true
k3s_instance_store_device: ""
k3s_instance_store_mount: /mnt/local
k3s_data_dir: /var/lib/rancher
k3s_local_storage_dir: "{{ k3s_data_dir }}/k3s/storage"
# Terraform-generated AWS inventory normally supplies aws_vpc_cidr and
# aws_public_subnet_cidr. Keep all AWS, k3s pod, and k3s service networks
# non-overlapping. Defaults use 10.x with second octets between 20 and 90.
k3s_cluster_cidr: 10.60.0.0/16
k3s_service_cidr: 10.70.0.0/16
k3s_cluster_dns: 10.70.0.10
k3s_system_rollout_timeout: 180s
k3s_wait_for_flannel: true
k3s_flannel_wait_retries: 60
k3s_flannel_wait_delay: 5
k3s_flannel_settle_seconds: 10
k3s_metrics_server_rollout_timeout: 300s
k3s_resolv_conf: /run/systemd/resolve/resolv.conf
k3s_restart_system_deployments_after_flannel: true
validate_k3s_wait_timeout: 180s
validate_k3s_dns_check_image: busybox:1.36
validate_k3s_internal_dns_name: kubernetes.default.svc.cluster.local
validate_k3s_external_dns_name: example.com

nginx_ingress_chart_version: ""
