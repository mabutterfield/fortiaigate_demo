---
# Copy this file to images.yml and update paths/tags for locally available image archives.
#
# version is the FortiAIGate release version.
# By default, publish_images.yml extracts loaded Docker RepoTags and preserves those exact tags when pushing.
# image_archive_dir points to a release directory containing per-image Docker archives.
# Only set image_tag or Triton tag fields when intentionally overriding deployment defaults.
publish_auto_image_map: true
fortiaigate_image_builds:
  - version: "8.0.0"
    # Loaded app image tag: V8.0.0-build0024
    # image_tag: "V8.0.0-build0024"
    image_archive_dir: /path/to/images/8.0.0
    state: active
    # Loaded Triton tags:
    # triton_model_image_tag: "0.1.4"
    # triton_image_tag: "25.11-onnx-trt-agt"

  - version: "8.0.1"
    # Loaded app image tag: V8.0.1-build0031
    # image_tag: "V8.0.1-build0031"
    image_archive_dir: /path/to/images/8.0.1
    state: archive
    # Loaded Triton tags:
    # triton_model_image_tag: "0.1.6-s1"
    # triton_image_tag: "25.11-onnx-trt-agt-s1"

# Select by version first when set. Otherwise publish all builds with this state.
publish_image_version: ""
publish_image_state: active
# Optional FortiAIGate target repo filter. Empty publishes all FAIG images.
# CLI example: ansible-playbook playbooks/publish_images.yml -e publish_target_repos=api,webui
publish_target_repos: []
