---
- name: Validate k3s node readiness
  ansible.builtin.command: /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes
  changed_when: false
  register: validate_nodes
  # - ansible.builtin.debug:
  #     var: validate_nodes.stdout_lines

- name: Validate Traefik is not installed
  ansible.builtin.shell: |
    set -euo pipefail
    ! /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get pods -A \
      | grep -Ei 'traefik|svclb-traefik'
  args:
    executable: /bin/bash
  changed_when: false
  register: validate_no_traefik
  # - ansible.builtin.debug:
  #     var: validate_no_traefik.stdout_lines

- name: Validate nginx ingress is installed
  ansible.builtin.command: /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get pods -n ingress-nginx
  changed_when: false
  register: validate_nginx
  # - ansible.builtin.debug:
  #     var: validate_nginx.stdout_lines

- name: Validate GPU allocatable resource
  ansible.builtin.shell: |
    /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes -o json \
      | jq -e '.items[].status.allocatable["nvidia.com/gpu"] | tonumber >= 1'
  args:
    executable: /bin/bash
  changed_when: false
  register: validate_gpu
  # - ansible.builtin.debug:
  #     var: validate_gpu.stdout_lines

- name: Validate NVIDIA RuntimeClass
  ansible.builtin.command: /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get runtimeclass nvidia
  changed_when: false
  register: validate_runtime_class
  # - ansible.builtin.debug:
  #     var: validate_runtime_class.stdout_lines

- name: Validate Triton pod sees NVIDIA devices
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - exec
      - -n
      - "{{ fortiaigate_namespace }}"
      - deploy/triton-server
      - --
      - sh
      - -c
      - "ls -l /dev/nvidia*"
  changed_when: false
  register: validate_triton_devices
  # - ansible.builtin.debug:
  #     var: validate_triton_devices.stdout_lines

- name: Validate Triton /dev/shm size
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - exec
      - -n
      - "{{ fortiaigate_namespace }}"
      - deploy/triton-server
      - --
      - df
      - -h
      - /dev/shm
  changed_when: false
  register: validate_triton_shm
  # - ansible.builtin.debug:
  #     var: validate_triton_shm.stdout_lines

- name: Validate FortiAIGate UI HTTP response
  ansible.builtin.command:
    argv:
      - curl
      - -k
      - -sS
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - "https://127.0.0.1{{ validate_faig_ui_path }}"
  changed_when: false
  register: validate_ui
  failed_when: validate_ui.stdout | int < 200 or validate_ui.stdout | int >= 500
  # - ansible.builtin.debug:
  #     var: validate_ui.stdout

- name: Validate FortiAIGate API login behavior
  ansible.builtin.command: curl -k -sS -o /dev/null -w "%{http_code}" https://127.0.0.1/api/login
  changed_when: false
  register: validate_api_login
  failed_when: validate_api_login.stdout | int < 200 or validate_api_login.stdout | int >= 500
  # - ansible.builtin.debug:
  #     var: validate_api_login.stdout

- name: Validate FortiAIGate Ollama forwarding after manual provider setup
  ansible.builtin.shell: |
    curl -k -f -sS https://127.0.0.1/v1/chat/completions \
      -H "Content-Type: application/json" \
      -d '{"model":"{{ ollama_model }}","messages":[{"role":"user","content":"Say hello in one sentence."}]}'
  args:
    executable: /bin/bash
  changed_when: false
  register: validate_ollama_forward
  when: validate_faig_ollama_forwarding | bool
  # - ansible.builtin.debug:
  #     var: validate_ollama_forward.stdout_lines

- name: Build FortiAIGate readiness summary
  ansible.builtin.shell: |
    set -euo pipefail
    /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get pods -n {{ fortiaigate_namespace }} -o json \
      | /usr/bin/python3 -c '
    import json
    import sys

    data = json.load(sys.stdin)
    pods = data.get("items", [])
    problems = []
    ready_count = 0

    for pod in pods:
        metadata = pod.get("metadata", {})
        status = pod.get("status", {})
        name = metadata.get("name", "<unknown>")
        phase = status.get("phase", "Unknown")
        conditions = status.get("conditions", [])
        ready = phase == "Succeeded" or any(
            condition.get("type") == "Ready" and condition.get("status") == "True"
            for condition in conditions
        )
        waiting_reasons = []
        for container_status in status.get("containerStatuses", []):
            state = container_status.get("state", {})
            waiting = state.get("waiting")
            if waiting:
                reason = waiting.get("reason", "Waiting")
                message = waiting.get("message", "")
                waiting_reasons.append(reason if not message else f"{reason}: {message}")
        if ready and phase in ("Running", "Succeeded"):
            ready_count += 1
            continue
        detail = f"{name}: phase={phase}, ready={ready}"
        if waiting_reasons:
            detail = detail + ", waiting=" + "; ".join(waiting_reasons)
        problems.append(detail)

    result = {
        "ready": bool(pods) and ready_count == len(pods),
        "ready_count": ready_count,
        "total_count": len(pods),
        "problems": problems,
    }
    print(json.dumps(result))
    '
  args:
    executable: /bin/bash
  changed_when: false
  register: validate_faig_readiness_summary_raw
  # - ansible.builtin.debug:
  #     var: validate_faig_readiness_summary_raw.stdout

- name: Set FortiAIGate readiness summary facts
  ansible.builtin.set_fact:
    validate_faig_readiness_summary: "{{ validate_faig_readiness_summary_raw.stdout | from_json }}"
    validate_faig_effective_ui_path: "{{ validate_faig_ui_path }}"
    validate_faig_login_host: >-
      {{
        fortiaigate_ingress_host
        if (fortiaigate_ingress_host is defined and fortiaigate_ingress_host | length > 0)
        else (ansible_host | default(inventory_hostname))
      }}
  # - ansible.builtin.debug:
  #     var: validate_faig_readiness_summary

- name: Set FortiAIGate login URL
  ansible.builtin.set_fact:
    validate_faig_login_url: >-
      {{
        validate_faig_login_url_override
        if validate_faig_login_url_override | length > 0
        else 'https://' ~ validate_faig_login_host ~ validate_faig_effective_ui_path
      }}
  # - ansible.builtin.debug:
  #     var: validate_faig_login_url

- name: Show FortiAIGate validation summary
  ansible.builtin.debug:
    msg:
      - "FortiAIGate status: {{ 'READY' if validate_faig_readiness_summary.ready else 'NOT READY' }}"
      - "Pods ready: {{ validate_faig_readiness_summary.ready_count }}/{{ validate_faig_readiness_summary.total_count }}"
      - "UI check path: {{ validate_faig_effective_ui_path }}"
      - "UI check HTTP status: {{ validate_ui.stdout }}"
      - "API login check HTTP status: {{ validate_api_login.stdout }}"
      - "Login URL: {{ validate_faig_login_url }}"
      - "Problems: {{ validate_faig_readiness_summary.problems | join(' | ') if validate_faig_readiness_summary.problems | length > 0 else 'none' }}"

- name: Fail when FortiAIGate is not ready
  ansible.builtin.fail:
    msg: "FortiAIGate is not ready: {{ validate_faig_readiness_summary.problems | join(' | ') }}"
  when: not validate_faig_readiness_summary.ready
