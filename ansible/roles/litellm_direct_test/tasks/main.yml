---
- name: Validate LiteLLM direct test settings
  ansible.builtin.assert:
    that:
      - litellm_master_key is defined
      - litellm_master_key | length > 0
      - litellm_direct_test_base_url | length > 0
      - litellm_direct_test_model | length > 0
      - litellm_direct_test_models is sequence
      - litellm_direct_test_message | length > 0
    fail_msg: "LiteLLM direct test requires litellm_master_key, base URL, model, and message."

- name: List LiteLLM models through direct endpoint
  ansible.builtin.uri:
    url: "{{ litellm_direct_test_base_url }}/models"
    method: GET
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
    return_content: true
    status_code: 200
    timeout: "{{ litellm_direct_test_timeout_seconds }}"
  no_log: true
  register: litellm_direct_test_models_response

- name: Set LiteLLM direct poll mode
  ansible.builtin.set_fact:
    litellm_direct_test_poll_all_enabled: "{{ (poll_all_endpoints | default(false) | bool) or (litellm_direct_test_poll_all_endpoints | bool) }}"
  # - ansible.builtin.debug:
  #     var: litellm_direct_test_poll_all_enabled

- name: Set LiteLLM direct model list facts
  ansible.builtin.set_fact:
    litellm_direct_test_model_ids: "{{ litellm_direct_test_models_response.json.data | default([]) | map(attribute='id') | list }}"
    litellm_direct_test_requested_models: >-
      {{
        (
          litellm_direct_test_models
          if litellm_direct_test_models | length > 0
          else (litellm_direct_test_models_response.json.data | default([]) | map(attribute='id') | list)
        )
        if litellm_direct_test_poll_all_enabled | bool
        else (
          litellm_direct_test_models
          if litellm_direct_test_models | length > 0
          else [litellm_direct_test_model]
        )
      }}
  # - ansible.builtin.debug:
  #     var: litellm_direct_test_requested_models

- name: Send LiteLLM direct chat completion
  ansible.builtin.uri:
    url: "{{ litellm_direct_test_base_url }}/chat/completions"
    method: POST
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
      Content-Type: application/json
    body_format: json
    body:
      model: "{{ item }}"
      messages:
        - role: user
          content: "{{ litellm_direct_test_message }}"
      temperature: "{{ litellm_direct_test_temperature }}"
      max_tokens: "{{ litellm_direct_test_max_tokens }}"
    return_content: true
    status_code: 200
    timeout: "{{ litellm_direct_test_timeout_seconds }}"
  no_log: true
  register: litellm_direct_test_chat_responses
  failed_when: false
  loop: "{{ litellm_direct_test_requested_models }}"
  loop_control:
    label: "{{ item }}"

- name: Reset LiteLLM direct test summaries
  ansible.builtin.set_fact:
    litellm_direct_test_summaries: []
  # - ansible.builtin.debug:
  #     var: litellm_direct_test_summaries

- name: Build LiteLLM direct test summaries
  ansible.builtin.set_fact:
    litellm_direct_test_summaries: >-
      {{
        litellm_direct_test_summaries
        + [
          {
            'model': item.item,
            'status': item.status | default(0),
            'failed': item.failed | default(false),
            'response_text': item.json.choices[0].message.content | default(''),
            'expected_present': (
              litellm_direct_test_expected_text | length == 0
              or litellm_direct_test_expected_text in (item.json.choices[0].message.content | default(''))
            ),
            'error': item.msg | default('')
          }
        ]
      }}
  loop: "{{ litellm_direct_test_chat_responses.results }}"
  loop_control:
    label: "{{ item.item }}"
  # - ansible.builtin.debug:
  #     var: litellm_direct_test_summaries

- name: Show LiteLLM direct test summary
  ansible.builtin.debug:
    msg:
      - "LiteLLM direct test: {{ 'PASS' if (item.status | int) == 200 and item.expected_present else 'CHECK RESPONSE' }}"
      - "Base URL: {{ litellm_direct_test_base_url }}"
      - "Available models: {{ litellm_direct_test_model_ids | join(', ') }}"
      - "Requested model: {{ item.model }}"
      - "HTTP status: {{ item.status }}"
      - "Expected text: {{ litellm_direct_test_expected_text if litellm_direct_test_expected_text | length > 0 else 'not set' }}"
      - "Expected text present: {{ item.expected_present }}"
      - "Error: {{ item.error if item.error | length > 0 else 'none' }}"
      - "Response: {{ item.response_text }}"
  loop: "{{ litellm_direct_test_summaries }}"
  loop_control:
    label: "{{ item.model }}"

- name: Fail when LiteLLM direct test did not return HTTP 200
  ansible.builtin.fail:
    msg: >-
      LiteLLM direct test for model {{ item.model }} failed with HTTP
      {{ item.status }}. Error={{ item.error if item.error | length > 0 else 'none' }}.
      Response was: {{ item.response_text }}
  loop: "{{ litellm_direct_test_summaries }}"
  loop_control:
    label: "{{ item.model }}"
  when: (item.status | int) != 200

- name: Fail when expected text is missing
  ansible.builtin.fail:
    msg: >-
      LiteLLM direct response for model {{ item.model }} did not include
      expected text {{ litellm_direct_test_expected_text }}. Response was:
      {{ item.response_text }}
  loop: "{{ litellm_direct_test_summaries }}"
  loop_control:
    label: "{{ item.model }}"
  when:
    - litellm_direct_test_fail_on_missing_expected_text | bool
    - not item.expected_present
