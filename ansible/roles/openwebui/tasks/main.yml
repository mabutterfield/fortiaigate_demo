---
- name: Skip Open WebUI deployment when disabled
  ansible.builtin.debug:
    msg: "openwebui_enabled=false; skipping Open WebUI deployment."
  when: not openwebui_enabled | bool

- name: Validate Open WebUI instance definitions
  ansible.builtin.assert:
    that:
      - openwebui_instances is sequence
      - openwebui_instances | length > 0
      - item.name is defined
      - item.name | length > 0
      - item.namespace is defined
      - item.namespace | length > 0
      - item.release_name is defined
      - item.release_name | length > 0
      - item.openai_base_url is defined
      - item.openai_base_url | length > 0
      - item.node_port is defined
      - item.node_port | int >= 30000
      - item.node_port | int <= 32767
    fail_msg: "Each openwebui_instances entry needs name, namespace, release_name, openai_base_url, and a NodePort between 30000 and 32767."
  loop: "{{ openwebui_instances }}"
  when: openwebui_enabled | bool

- name: Install Helm when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  args:
    executable: /bin/bash
    creates: /usr/local/bin/helm
  when: openwebui_enabled | bool

- name: Read Open WebUI Bedrock model IDs from Terraform
  ansible.builtin.command:
    argv:
      - terraform
      - "-chdir={{ openwebui_bedrock_module_path }}"
      - output
      - -json
      - bedrock_model_ids
  changed_when: false
  failed_when: false
  register: openwebui_bedrock_models_raw
  delegate_to: localhost
  become: false
  when:
    - openwebui_enabled | bool
    - openwebui_direct_provider == "bedrock"
    - openwebui_bedrock_use_terraform_output | bool
  # - ansible.builtin.debug:
  #     var: openwebui_bedrock_models_raw.stdout_lines

- name: Read Open WebUI Bedrock region from Terraform
  ansible.builtin.command:
    argv:
      - terraform
      - "-chdir={{ openwebui_bedrock_module_path }}"
      - output
      - -raw
      - bedrock_region
  changed_when: false
  failed_when: false
  register: openwebui_bedrock_region_raw
  delegate_to: localhost
  become: false
  when:
    - openwebui_enabled | bool
    - openwebui_direct_provider == "bedrock"
    - openwebui_bedrock_use_terraform_output | bool
  # - ansible.builtin.debug:
  #     var: openwebui_bedrock_region_raw.stdout_lines

- name: Set Open WebUI Bedrock model list fact
  ansible.builtin.set_fact:
    openwebui_bedrock_models: >-
      {{
        (openwebui_bedrock_models_raw.stdout | from_json) | default([], true)
        if (
          openwebui_bedrock_models_raw is defined
          and openwebui_bedrock_models_raw.rc == 0
          and openwebui_bedrock_models_raw.stdout | default('', true) | length > 0
        )
        else []
      }}
  when:
    - openwebui_enabled | bool
    - openwebui_direct_provider == "bedrock"
  # - ansible.builtin.debug:
  #     var: openwebui_bedrock_models

- name: Set Open WebUI Bedrock proxy facts
  ansible.builtin.set_fact:
    openwebui_effective_bedrock_region: >-
      {{
        openwebui_bedrock_region | default('', true) | trim
        if openwebui_bedrock_region | default('', true) | trim | length > 0
        else (
          openwebui_bedrock_region_raw.stdout | trim
          if (
            openwebui_bedrock_region_raw is defined
            and openwebui_bedrock_region_raw.rc == 0
            and openwebui_bedrock_region_raw.stdout | default('', true) | length > 0
          )
          else aws_region
        )
      }}
    openwebui_effective_bedrock_model_id: >-
      {{
        openwebui_bedrock_model_id | default('', true) | trim
        if openwebui_bedrock_model_id | default('', true) | trim | length > 0
        else (
          openwebui_bedrock_models[0]
          if (
            openwebui_bedrock_models | length > 0
          )
          else openwebui_bedrock_fallback_model_id | default('openai.gpt-oss-20b-1:0', true)
        )
      }}
  when:
    - openwebui_enabled | bool
    - openwebui_direct_provider == "bedrock"
  # - ansible.builtin.debug:
  #     var: openwebui_effective_bedrock_model_id

- name: Remove previous remote Open WebUI chart staging directory
  ansible.builtin.file:
    path: "{{ openwebui_chart_remote_root }}"
    state: absent
  when: openwebui_enabled | bool

- name: Create remote Open WebUI chart staging directory
  ansible.builtin.file:
    path: "{{ openwebui_chart_remote_root }}"
    state: directory
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0755"
  when: openwebui_enabled | bool

- name: Copy Open WebUI Helm chart to remote host
  ansible.builtin.copy:
    src: chart/
    dest: "{{ openwebui_chart_remote_root }}/"
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0644"
  when: openwebui_enabled | bool

- name: Create remote Open WebUI values directory
  ansible.builtin.file:
    path: "{{ openwebui_values_remote_dir }}"
    state: directory
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0700"
  when: openwebui_enabled | bool

- name: Render Open WebUI Helm values
  ansible.builtin.template:
    src: values.yaml.j2
    dest: "{{ openwebui_values_remote_dir }}/{{ item.name }}.yaml"
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0600"
  loop: "{{ openwebui_instances }}"
  no_log: true
  when: openwebui_enabled | bool

- name: Deploy Open WebUI releases
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - "{{ item.release_name }}"
      - "{{ openwebui_chart_remote_root }}"
      - --namespace
      - "{{ item.namespace }}"
      - --create-namespace
      - --values
      - "{{ openwebui_values_remote_dir }}/{{ item.name }}.yaml"
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
  loop: "{{ openwebui_instances }}"
  register: openwebui_helm_deploy
  changed_when: "'deployed' in openwebui_helm_deploy.stdout or 'upgraded' in openwebui_helm_deploy.stdout"
  when:
    - openwebui_enabled | bool
    - not openwebui_helm_wait | bool
  # - ansible.builtin.debug:
  #     var: openwebui_helm_deploy.stdout_lines

- name: Deploy Open WebUI releases and wait
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - "{{ item.release_name }}"
      - "{{ openwebui_chart_remote_root }}"
      - --namespace
      - "{{ item.namespace }}"
      - --create-namespace
      - --values
      - "{{ openwebui_values_remote_dir }}/{{ item.name }}.yaml"
      - --wait
      - --timeout
      - "{{ openwebui_helm_timeout }}"
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
  loop: "{{ openwebui_instances }}"
  register: openwebui_helm_wait_deploy
  changed_when: "'deployed' in openwebui_helm_wait_deploy.stdout or 'upgraded' in openwebui_helm_wait_deploy.stdout"
  when:
    - openwebui_enabled | bool
    - openwebui_helm_wait | bool
  # - ansible.builtin.debug:
  #     var: openwebui_helm_wait_deploy.stdout_lines

- name: Wait for Open WebUI deployments to become available
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - rollout
      - status
      - "deployment/{{ item.release_name }}"
      - -n
      - "{{ item.namespace }}"
      - "--timeout={{ openwebui_helm_timeout }}"
  loop: "{{ openwebui_instances }}"
  changed_when: false
  failed_when: false
  register: openwebui_rollout_status
  when:
    - openwebui_enabled | bool
    - openwebui_wait_for_rollout | bool
  # - ansible.builtin.debug:
  #     var: openwebui_rollout_status.results

- name: Set Open WebUI access URL facts
  ansible.builtin.set_fact:
    openwebui_access_urls: >-
      {{
        openwebui_access_urls | default([])
        + [
          item.name ~ ': http://' ~
          (
            public_ip
            if (public_ip is defined and public_ip | length > 0)
            else (ansible_host | default(inventory_hostname))
          )
          ~ ':' ~ (item.node_port | string)
        ]
      }}
  loop: "{{ openwebui_instances }}"
  when: openwebui_enabled | bool
  # - ansible.builtin.debug:
  #     var: openwebui_access_urls

- name: Show Open WebUI deployment summary
  ansible.builtin.debug:
    msg:
      - "Open WebUI releases: {{ openwebui_instances | map(attribute='release_name') | join(', ') }}"
      - "Open WebUI URLs: {{ openwebui_access_urls | default([]) | join(' | ') }}"
      - "Helm accepted the install or upgrade; run status_openwebui.yml to check READY/NOT READY."
      - "Routing: Open WebUI is configured with direct LiteLLM and FortiAIGate provider URLs."
  when: openwebui_enabled | bool
