apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openwebui-demo.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "openwebui-demo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  openai-api-key: {{ .Values.openai.apiKey | quote }}
  webui-secret-key: {{ .Values.webui.secretKey | quote }}
