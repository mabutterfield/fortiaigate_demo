---
- name: Read approved Bedrock model IDs from Terraform output
  ansible.builtin.command:
    argv:
      - terraform
      - "-chdir={{ fortiaigate_test_bedrock_module_path }}"
      - output
      - -json
      - bedrock_model_ids
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  register: fortiaigate_test_bedrock_models_raw
  when: fortiaigate_test_use_bedrock_output | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_bedrock_models_raw.stdout_lines

- name: Set approved Bedrock model list from Terraform
  ansible.builtin.set_fact:
    fortiaigate_test_bedrock_models: "{{ fortiaigate_test_bedrock_models_raw.stdout | from_json }}"
  when: >-
    fortiaigate_test_use_bedrock_output | bool
    and fortiaigate_test_bedrock_models_raw is defined
    and fortiaigate_test_bedrock_models_raw.rc == 0
    and fortiaigate_test_bedrock_models_raw.stdout | length > 0
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_bedrock_models

- name: Set empty approved Bedrock model list when Terraform output is unavailable
  ansible.builtin.set_fact:
    fortiaigate_test_bedrock_models: []
  when: fortiaigate_test_bedrock_models is not defined
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_bedrock_models

- name: Set FortiAIGate test target facts
  ansible.builtin.set_fact:
    fortiaigate_test_host: >-
      {{
        fortiaigate_test_host_override
        if fortiaigate_test_host_override | length > 0
        else (
          public_ip
          if (public_ip is defined and public_ip | default('', true) | length > 0)
          else (ansible_host | default(inventory_hostname))
        )
      }}
    fortiaigate_test_effective_model: >-
      {{
        fortiaigate_test_model
        if fortiaigate_test_model | length > 0
        else (
          fortiaigate_test_default_model
          if fortiaigate_test_default_model | length > 0
          else (
            fortiaigate_test_bedrock_models[0]
            if fortiaigate_test_bedrock_models | length > 0
            else fortiaigate_test_fallback_model
          )
        )
      }}
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_effective_model

- name: Set FortiAIGate endpoint poll mode
  ansible.builtin.set_fact:
    fortiaigate_test_poll_all_enabled: "{{ (poll_all_endpoints | default(false) | bool) or (fortiaigate_test_poll_all_endpoints | bool) }}"
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_poll_all_enabled

- name: Reset FortiAIGate endpoint test cases
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: []
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add single FortiAIGate endpoint test case
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases:
      - name: default
        endpoint_path: "{{ fortiaigate_test_endpoint_path }}"
        model: "{{ fortiaigate_test_effective_model }}"
        headers: []
  when: not fortiaigate_test_poll_all_enabled | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add FortiAIGate static route test cases
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'static:' ~ item.name,
            'endpoint_path': (item.base_path | regex_replace('/$', '')) ~ '/chat/completions',
            'model': item.model,
            'headers': []
          }
        ]
      }}
  loop: "{{ chatbot_faig_static_routes | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_static_endpoints | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add selected FortiAIGate intelligent route test case
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'intelligent',
            'display_name': 'intelligent',
            'endpoint_path': (item.base_path | regex_replace('/$', '')) ~ '/chat/completions',
            'model': item.model,
            'headers': (
              [faig_model_route_header_name ~ ': ' ~ ((item.header_value if item.header_value is defined else item.model) | string)]
              if (
                faig_model_route_header_name | default('') | length > 0
                and ((item.header_value if item.header_value is defined else item.model) | string | length > 0)
              )
              else []
            )
          }
        ]
      }}
  loop: "{{ chatbot_faig_header_routes | default([]) | selectattr('name', 'equalto', chatbot_faig_header_route | default('passthrough')) | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_header_endpoints | bool
    - not fortiaigate_test_include_all_header_route_profiles | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add all FortiAIGate intelligent route profile test cases
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'header:' ~ item.name,
            'display_name': 'intelligent:' ~ item.name,
            'endpoint_path': (item.base_path | regex_replace('/$', '')) ~ '/chat/completions',
            'model': item.model,
            'headers': (
              [faig_model_route_header_name ~ ': ' ~ ((item.header_value if item.header_value is defined else item.model) | string)]
              if (
                faig_model_route_header_name | default('') | length > 0
                and ((item.header_value if item.header_value is defined else item.model) | string | length > 0)
              )
              else []
            )
          }
        ]
      }}
  loop: "{{ chatbot_faig_header_routes | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_header_endpoints | bool
    - fortiaigate_test_include_all_header_route_profiles | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add Open WebUI FortiAIGate endpoint test case
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'openwebui',
            'endpoint_path': (litellm_faig_base_path | default('/v1/passthrough') | regex_replace('/$', '')) ~ '/chat/completions',
            'model': fortiaigate_test_openwebui_model,
            'headers': []
          }
        ]
      }}
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_openwebui_endpoint | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add re-entry FortiAIGate endpoint test case
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'reentry',
            'endpoint_path': (litellm_faig_backend_base_path | default('/v1/passthrough') | regex_replace('/$', '')) ~ '/chat/completions',
            'model': fortiaigate_test_backend_model,
            'headers': []
          }
        ]
      }}
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_backend_endpoint | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add default FortiAIGate test endpoint case
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'default',
            'endpoint_path': fortiaigate_test_endpoint_path,
            'model': fortiaigate_test_effective_model,
            'headers': []
          }
        ]
      }}
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_test_endpoint | bool
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Add optional Ollama FortiAIGate endpoint case
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_cases: >-
      {{
        fortiaigate_test_endpoint_cases
        + [
          {
            'name': 'ollama',
            'endpoint_path': fortiaigate_test_ollama_endpoint_path,
            'model': fortiaigate_test_ollama_model,
            'headers': []
          }
        ]
      }}
  when:
    - fortiaigate_test_poll_all_enabled | bool
    - fortiaigate_test_include_ollama_endpoint | bool
    - fortiaigate_test_ollama_model | length > 0
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_cases

- name: Reset FortiAIGate endpoint test results
  ansible.builtin.set_fact:
    fortiaigate_test_endpoint_results: []
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_endpoint_results

- name: Run FortiAIGate endpoint test cases
  ansible.builtin.include_tasks: run_one.yml
  loop: "{{ fortiaigate_test_endpoint_cases }}"
  loop_control:
    loop_var: fortiaigate_test_case
    label: "{{ fortiaigate_test_case.name }}"

- name: Reset concise FortiAIGate endpoint test summary lines
  ansible.builtin.set_fact:
    fortiaigate_test_summary_lines: []
    fortiaigate_test_failed_summary_lines: []
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_summary_lines

- name: Build concise FortiAIGate endpoint test summary lines
  ansible.builtin.set_fact:
    fortiaigate_test_summary_lines: >-
      {{
        (fortiaigate_test_summary_lines | default([]))
        + [
          'endpoint: '
          ~ result.display_name
          ~ ' | status: '
          ~ ('working' if fortiaigate_test_result_ok | bool else 'failed (HTTP ' ~ result.http_status ~ ')')
        ]
      }}
    fortiaigate_test_failed_summary_lines: >-
      {{
        fortiaigate_test_failed_summary_lines
        + (
          [
            'endpoint: '
            ~ result.display_name
            ~ ' | HTTP '
            ~ result.http_status
            ~ ' | URI: '
            ~ result.uri
          ]
          if not fortiaigate_test_result_ok | bool
          else []
        )
      }}
  loop: "{{ fortiaigate_test_endpoint_results }}"
  loop_control:
    loop_var: result
    label: "{{ result.display_name }}"
  vars:
    fortiaigate_test_result_ok: "{{ (result.http_status | int) >= 200 and (result.http_status | int) < 300 }}"
  # - ansible.builtin.debug:
  #     var: fortiaigate_test_summary_lines

- name: Show FortiAIGate endpoint test summary
  ansible.builtin.debug:
    msg: >-
      {{
        [
          'FortiAIGate endpoint test summary: '
          ~ ('PASS' if fortiaigate_test_failed_summary_lines | length == 0 else 'FAIL'),
          'Endpoints tested: ' ~ (fortiaigate_test_endpoint_results | length)
        ]
        + fortiaigate_test_summary_lines
        + (
          ['Failed endpoints:'] + fortiaigate_test_failed_summary_lines
          if fortiaigate_test_failed_summary_lines | length > 0
          else []
        )
      }}

- name: Fail when one or more FortiAIGate endpoint tests failed
  ansible.builtin.fail:
    msg: "{{ ['FortiAIGate endpoint tests failed after completing all cases.'] + fortiaigate_test_failed_summary_lines }}"
  when: fortiaigate_test_failed_summary_lines | length > 0
