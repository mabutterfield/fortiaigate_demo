---
fortiaigate_syslog_collector_enabled: "{{ fortiaigate_syslog_bucket_name | default('', true) | string | length > 0 }}"
fortiaigate_syslog_namespace: fortiaigate-logging
fortiaigate_syslog_release_name: fortiaigate-syslog
fortiaigate_syslog_image_repository: fluent/fluent-bit
fortiaigate_syslog_image_tag: "3.2"
fortiaigate_syslog_image_pull_policy: IfNotPresent
fortiaigate_syslog_service_port: 514
fortiaigate_syslog_container_port: 5514
fortiaigate_syslog_s3_bucket: "{{ fortiaigate_syslog_bucket_name | default('', true) }}"
fortiaigate_syslog_s3_prefix: "{{ fortiaigate_syslog_prefix | default('fortiaigate/syslog', true) }}"
fortiaigate_syslog_s3_total_file_size: 256K
fortiaigate_syslog_s3_upload_timeout: 30s
fortiaigate_syslog_deployment_id: "{{ name_prefix | default('fortiaigate-demo') }}"
fortiaigate_syslog_manifest_remote_path: "/home/{{ ansible_user }}/tmp/fortiaigate-syslog-collector.yaml"
fortiaigate_syslog_wait_for_rollout: true
fortiaigate_syslog_rollout_timeout: 180s
