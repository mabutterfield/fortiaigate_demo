---
- name: Skip demo home deployment when disabled
  ansible.builtin.debug:
    msg: "demo_home_enabled=false; skipping demo home deployment."
  when: not demo_home_enabled | bool

- name: Set demo home host fact
  ansible.builtin.set_fact:
    demo_home_host: >-
      {{
        public_ip
        if (public_ip is defined and public_ip | default('', true) | length > 0)
        else (ansible_host | default(inventory_hostname))
      }}
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_host

- name: Read FortiWeb public IP from Terraform when not already set
  ansible.builtin.command:
    argv:
      - terraform
      - -chdir={{ demo_home_fortiweb_terraform_dir }}
      - output
      - -raw
      - fortiweb_public_ip
  delegate_to: localhost
  become: false
  check_mode: false
  changed_when: false
  failed_when: false
  register: demo_home_fortiweb_public_ip_raw
  no_log: true
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_host | default('', true) | length == 0
  # - ansible.builtin.debug:
  #     msg: "FortiWeb public IP discovered: {{ demo_home_fortiweb_public_ip_raw.rc == 0 and demo_home_fortiweb_public_ip_raw.stdout | default('') | trim | length > 0 }}"

- name: Read FortiWeb admin URL from Terraform when not already set
  ansible.builtin.command:
    argv:
      - terraform
      - -chdir={{ demo_home_fortiweb_terraform_dir }}
      - output
      - -raw
      - fortiweb_admin_url
  delegate_to: localhost
  become: false
  check_mode: false
  changed_when: false
  failed_when: false
  register: demo_home_fortiweb_admin_url_raw
  no_log: true
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_admin_url | default('', true) | length == 0
  # - ansible.builtin.debug:
  #     msg: "FortiWeb admin URL discovered: {{ demo_home_fortiweb_admin_url_raw.rc == 0 and demo_home_fortiweb_admin_url_raw.stdout | default('') | trim | length > 0 }}"

- name: Read FortiGate admin URL from Terraform when not already set
  ansible.builtin.command:
    argv:
      - terraform
      - -chdir={{ demo_home_fortigate_terraform_dir }}
      - output
      - -raw
      - fortigate_admin_url
  delegate_to: localhost
  become: false
  check_mode: false
  changed_when: false
  failed_when: false
  register: demo_home_fortigate_admin_url_raw
  no_log: true
  when:
    - demo_home_enabled | bool
    - demo_home_fortigate_enabled | bool
    - demo_home_fortigate_admin_url | default('', true) | length == 0
  # - ansible.builtin.debug:
  #     msg: "FortiGate admin URL discovered: {{ demo_home_fortigate_admin_url_raw.rc == 0 and demo_home_fortigate_admin_url_raw.stdout | default('') | trim | length > 0 }}"

- name: Set demo home FortiWeb host fact
  ansible.builtin.set_fact:
    demo_home_fortiweb_effective_host: >-
      {{
        demo_home_fortiweb_host
        if demo_home_fortiweb_host | default('', true) | length > 0
        else (
          demo_home_fortiweb_public_ip_raw.stdout | default('') | trim
          if demo_home_fortiweb_public_ip_raw is defined
          and demo_home_fortiweb_public_ip_raw.rc | default(1) == 0
          else ''
        )
      }}
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_fortiweb_effective_host

- name: Set demo home admin URL facts
  ansible.builtin.set_fact:
    demo_home_fortiweb_effective_admin_url: >-
      {{
        demo_home_fortiweb_admin_url
        if demo_home_fortiweb_admin_url | default('', true) | length > 0
        else (
          demo_home_fortiweb_admin_url_raw.stdout | default('') | trim
          if demo_home_fortiweb_admin_url_raw is defined
          and demo_home_fortiweb_admin_url_raw.rc | default(1) == 0
          else ''
        )
      }}
    demo_home_fortigate_effective_admin_url: >-
      {{
        demo_home_fortigate_admin_url
        if demo_home_fortigate_admin_url | default('', true) | length > 0
        else (
          demo_home_fortigate_admin_url_raw.stdout | default('') | trim
          if demo_home_fortigate_admin_url_raw is defined
          and demo_home_fortigate_admin_url_raw.rc | default(1) == 0
          else ''
        )
      }}
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     msg:
  #       - "FortiGate admin URL available: {{ demo_home_fortigate_effective_admin_url | length > 0 }}"
  #       - "FortiWeb admin URL available: {{ demo_home_fortiweb_effective_admin_url | length > 0 }}"

- name: Build demo home link facts
  ansible.builtin.set_fact:
    demo_home_fortiaigate_url: "https://{{ demo_home_host }}{{ fortiaigate_ui_path | default('/ui/') }}"
    demo_home_admin_links:
      - label: "FortiAIGate UI"
        url: "https://{{ demo_home_host }}{{ fortiaigate_ui_path | default('/ui/') }}"
    demo_home_litellm_url: "http://{{ demo_home_host }}:{{ litellm_node_port | default(demo_litellm_http_port | default(30083)) }}/ui/"
    demo_home_links:
      - label: "Demo Home HTTP"
        url: "http://{{ demo_home_host }}:{{ demo_home_node_port }}"
    demo_home_litellm_links:
      - label: "LiteLLM Admin UI HTTP"
        url: "http://{{ demo_home_host }}:{{ litellm_node_port | default(demo_litellm_http_port | default(30083)) }}/ui/"
    demo_home_mcp_links:
      - label: "MCP Demo Tools HTTP"
        url: "http://{{ demo_home_host }}:{{ mcp_node_port | default(demo_mcp_http_port | default(30084)) }}/tools"
    demo_home_openwebui_display_links: []
    demo_home_chatbot_display_links: []
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_fortiaigate_url

- name: Add optional FortiGate admin link
  ansible.builtin.set_fact:
    demo_home_admin_links: "{{ demo_home_admin_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "FortiGate Admin"
      url: "{{ demo_home_fortigate_effective_admin_url }}"
  when:
    - demo_home_enabled | bool
    - demo_home_fortigate_effective_admin_url | default('', true) | length > 0
    - demo_home_fortigate_effective_admin_url != "null"
  # - ansible.builtin.debug:
  #     var: demo_home_admin_links

- name: Add optional FortiWeb admin link
  ansible.builtin.set_fact:
    demo_home_admin_links: "{{ demo_home_admin_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "FortiWeb Admin"
      url: "{{ demo_home_fortiweb_effective_admin_url }}"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_effective_admin_url | default('', true) | length > 0
    - demo_home_fortiweb_effective_admin_url != "null"
  # - ansible.builtin.debug:
  #     var: demo_home_admin_links

- name: Add FortiWeb HTTP demo home links
  ansible.builtin.set_fact:
    demo_home_links: "{{ demo_home_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "Demo Home HTTP via FortiWeb"
      url: "http://{{ demo_home_fortiweb_effective_host }}:{{ demo_home_node_port }}"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_effective_host | default('', true) | length > 0
  # - ansible.builtin.debug:
  #     var: demo_home_links

- name: Add FortiWeb HTTP LiteLLM links
  ansible.builtin.set_fact:
    demo_home_litellm_links: "{{ demo_home_litellm_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "LiteLLM Admin UI HTTP via FortiWeb"
      url: "http://{{ demo_home_fortiweb_effective_host }}:{{ litellm_node_port | default(demo_litellm_http_port | default(30083)) }}/ui/"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_effective_host | default('', true) | length > 0
  # - ansible.builtin.debug:
  #     var: demo_home_litellm_links

- name: Add FortiWeb HTTP MCP links
  ansible.builtin.set_fact:
    demo_home_mcp_links: "{{ demo_home_mcp_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "MCP Demo Tools HTTP via FortiWeb"
      url: "http://{{ demo_home_fortiweb_effective_host }}:{{ mcp_node_port | default(demo_mcp_http_port | default(30084)) }}/tools"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_effective_host | default('', true) | length > 0
  # - ansible.builtin.debug:
  #     var: demo_home_mcp_links

- name: Add optional HTTPS demo home links
  ansible.builtin.set_fact:
    demo_home_links: "{{ demo_home_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "Demo Home HTTPS"
      url: "https://{{ demo_home_host }}:{{ demo_https_gateway_demo_home_https_port }}"
  when:
    - demo_home_enabled | bool
    - demo_https_gateway_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_links

- name: Add optional FortiWeb HTTPS demo home links
  ansible.builtin.set_fact:
    demo_home_links: "{{ demo_home_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "Demo Home HTTPS via FortiWeb"
      url: "https://{{ demo_home_fortiweb_effective_host }}:{{ demo_https_gateway_demo_home_https_port }}"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_effective_host | default('', true) | length > 0
    - demo_https_gateway_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_links

- name: Add optional HTTPS LiteLLM links
  ansible.builtin.set_fact:
    demo_home_litellm_links: "{{ demo_home_litellm_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "LiteLLM Admin UI HTTPS"
      url: "https://{{ demo_home_host }}:{{ demo_https_gateway_litellm_https_port }}/ui/"
  when:
    - demo_home_enabled | bool
    - demo_https_gateway_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_litellm_links

- name: Add optional FortiWeb HTTPS LiteLLM links
  ansible.builtin.set_fact:
    demo_home_litellm_links: "{{ demo_home_litellm_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "LiteLLM Admin UI HTTPS via FortiWeb"
      url: "https://{{ demo_home_fortiweb_effective_host }}:{{ demo_https_gateway_litellm_https_port }}/ui/"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_effective_host | default('', true) | length > 0
    - demo_https_gateway_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_litellm_links

- name: Add optional HTTPS MCP links
  ansible.builtin.set_fact:
    demo_home_mcp_links: "{{ demo_home_mcp_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "MCP Demo Tools HTTPS"
      url: "https://{{ demo_home_host }}:{{ demo_https_gateway_mcp_https_port }}/tools"
  when:
    - demo_home_enabled | bool
    - demo_https_gateway_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_mcp_links

- name: Add optional FortiWeb HTTPS MCP links
  ansible.builtin.set_fact:
    demo_home_mcp_links: "{{ demo_home_mcp_links + [demo_home_link] }}"
  vars:
    demo_home_link:
      label: "MCP Demo Tools HTTPS via FortiWeb"
      url: "https://{{ demo_home_fortiweb_effective_host }}:{{ demo_https_gateway_mcp_https_port }}/tools"
  when:
    - demo_home_enabled | bool
    - demo_home_fortiweb_enabled | bool
    - demo_home_fortiweb_effective_host | default('', true) | length > 0
    - demo_https_gateway_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_mcp_links

- name: Build demo home OpenWebUI links
  ansible.builtin.set_fact:
    demo_home_openwebui_display_links: "{{ demo_home_openwebui_display_links | default([]) + demo_home_links_for_item }}"
  vars:
    demo_home_links_for_item: >-
      {{
        [
          {
            'label': 'OpenWebUI ' ~ item.name ~ ' HTTP',
            'url': 'http://' ~ demo_home_host ~ ':' ~ (item.node_port | string)
          }
        ]
        + (
          [
            {
              'label': 'OpenWebUI ' ~ item.name ~ ' HTTP via FortiWeb',
              'url': 'http://' ~ demo_home_fortiweb_effective_host ~ ':' ~ (item.node_port | string)
            }
          ]
          if demo_home_fortiweb_enabled | bool and demo_home_fortiweb_effective_host | default('', true) | length > 0
          else []
        )
        + (
          [
            {
              'label': 'OpenWebUI ' ~ item.name ~ ' HTTPS',
              'url': 'https://' ~ demo_home_host ~ ':' ~ (demo_https_gateway_openwebui_https_port | string)
            }
          ]
          if demo_https_gateway_enabled | default(false) | bool
          else []
        )
        + (
          [
            {
              'label': 'OpenWebUI ' ~ item.name ~ ' HTTPS via FortiWeb',
              'url': 'https://' ~ demo_home_fortiweb_effective_host ~ ':' ~ (demo_https_gateway_openwebui_https_port | string)
            }
          ]
          if demo_home_fortiweb_enabled | bool
          and demo_home_fortiweb_effective_host | default('', true) | length > 0
          and demo_https_gateway_enabled | default(false) | bool
          else []
        )
      }}
  loop: "{{ openwebui_instances | default([]) }}"
  when:
    - demo_home_enabled | bool
    - openwebui_enabled | default(false) | bool
  # - ansible.builtin.debug:
  #     var: demo_home_openwebui_display_links

- name: Build demo home chatbot links
  ansible.builtin.set_fact:
    demo_home_chatbot_display_links: "{{ demo_home_chatbot_display_links | default([]) + demo_home_links_for_item }}"
  vars:
    demo_home_links_for_item: >-
      {{
        [
          {
            'label': item.name ~ ' HTTP (' ~ (item.provider_label | default('Model')) ~ ')',
            'url': 'http://' ~ demo_home_host ~ ':' ~ (item.node_port | string)
          }
        ]
        + (
          [
            {
              'label': item.name ~ ' HTTP via FortiWeb (' ~ (item.provider_label | default('Model')) ~ ')',
              'url': 'http://' ~ demo_home_fortiweb_effective_host ~ ':' ~ (item.node_port | string)
            }
          ]
          if demo_home_fortiweb_enabled | bool and demo_home_fortiweb_effective_host | default('', true) | length > 0
          else []
        )
        + (
          [
            {
              'label': item.name ~ ' HTTPS (' ~ (item.provider_label | default('Model')) ~ ')',
              'url': 'https://' ~ demo_home_host ~ ':' ~ (demo_https_gateway_chatbot_https_port | string)
            }
          ]
          if demo_https_gateway_enabled | default(false) | bool
          else []
        )
        + (
          [
            {
              'label': item.name ~ ' HTTPS via FortiWeb (' ~ (item.provider_label | default('Model')) ~ ')',
              'url': 'https://' ~ demo_home_fortiweb_effective_host ~ ':' ~ (demo_https_gateway_chatbot_https_port | string)
            }
          ]
          if demo_home_fortiweb_enabled | bool
          and demo_home_fortiweb_effective_host | default('', true) | length > 0
          and demo_https_gateway_enabled | default(false) | bool
          else []
        )
      }}
  loop: "{{ chatbot_instances | default([]) }}"
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_chatbot_display_links

- name: Set demo home display link facts
  ansible.builtin.set_fact:
    demo_home_openwebui_links: "{{ demo_home_openwebui_display_links | default([]) }}"
    demo_home_chatbot_links: "{{ demo_home_chatbot_display_links | default([]) }}"
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_openwebui_links

- name: Render demo home HTML fact
  ansible.builtin.set_fact:
    demo_home_html: "{{ lookup('ansible.builtin.template', role_path + '/templates/index.html.j2') }}"
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_html

- name: Remove previous remote demo home chart staging directory
  ansible.builtin.file:
    path: "{{ demo_home_chart_remote_root }}"
    state: absent
  when: demo_home_enabled | bool

- name: Create remote demo home chart staging directory
  ansible.builtin.file:
    path: "{{ demo_home_chart_remote_root }}"
    state: directory
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0755"
  when: demo_home_enabled | bool

- name: Copy demo home Helm chart to remote host
  ansible.builtin.copy:
    src: "{{ demo_home_chart_local_path }}/"
    dest: "{{ demo_home_chart_remote_root }}/"
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0644"
  when: demo_home_enabled | bool

- name: Render demo home Helm values
  ansible.builtin.template:
    src: values.yaml.j2
    dest: "{{ demo_home_values_remote_path }}"
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0600"
  when: demo_home_enabled | bool

- name: Deploy demo home release
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - "{{ demo_home_release_name }}"
      - "{{ demo_home_chart_remote_root }}"
      - --namespace
      - "{{ demo_home_namespace }}"
      - --create-namespace
      - --values
      - "{{ demo_home_values_remote_path }}"
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
  register: demo_home_helm_deploy
  changed_when: "'deployed' in demo_home_helm_deploy.stdout or 'upgraded' in demo_home_helm_deploy.stdout"
  when: demo_home_enabled | bool
  # - ansible.builtin.debug:
  #     var: demo_home_helm_deploy.stdout_lines

- name: Show demo home deployment summary
  ansible.builtin.debug:
    msg:
      - "Demo home release: {{ demo_home_release_name }}"
      - "Demo home URL: http://{{ demo_home_host }}:{{ demo_home_node_port }}"
      - "Helm accepted the install or upgrade; run status_demo_home.yml to check READY/NOT READY."
  when: demo_home_enabled | bool
