---
litellm_enabled: true
litellm_namespace: litellm
litellm_release_name: litellm
litellm_chart_local_path: "{{ playbook_dir }}/../../chatbot/litellm-chart"
litellm_chart_remote_root: "/home/{{ ansible_user }}/tmp/litellm-chart"
litellm_values_remote_path: "/home/{{ ansible_user }}/tmp/litellm-values.yaml"
litellm_helm_wait: false
litellm_helm_timeout: 10m

litellm_image_repository: ghcr.io/berriai/litellm
litellm_image_tag: main-stable
litellm_image_pull_policy: IfNotPresent
litellm_service_type: NodePort
litellm_service_port: 4000
litellm_node_port: "{{ demo_litellm_http_port | default(30083) }}"

litellm_master_key: sk-litellm-demo-change-me
litellm_ui_username: admin
litellm_ui_password: litellm-demo-change-me

litellm_postgres_enabled: true
litellm_postgres_image_repository: postgres
litellm_postgres_image_tag: "16-alpine"
litellm_postgres_image_pull_policy: IfNotPresent
litellm_postgres_storage_class: local-path
litellm_postgres_storage_size: 5Gi
litellm_postgres_database: litellm
litellm_postgres_username: litellm
litellm_postgres_password: litellm-demo-change-me
litellm_database_connection_pool_limit: 10
litellm_database_connection_timeout: 60

litellm_bedrock_module_path: "{{ playbook_dir }}/../../terraform/aws-prep"
litellm_bedrock_use_terraform_output: true
litellm_bedrock_model_id: "{{ direct_model_bedrock_model | default('') }}"
litellm_bedrock_fallback_model_id: "{{ direct_model_bedrock_fallback_model | default('openai.gpt-oss-20b-1:0') }}"
litellm_bedrock_region: "{{ direct_model_bedrock_region | default('') }}"
litellm_passthrough_model_alias: pass-bedrock
litellm_demo_a_model_alias: demo-a
litellm_demo_b_model_alias: demo-b
litellm_demo_a_faig_be_model_alias: demo-a-faig-be
litellm_demo_b_faig_be_model_alias: demo-b-faig-be
litellm_faig_backend_downstream_model: "{{ litellm_passthrough_model_alias }}"
faig_internal_base_url: "http://ingress-nginx-controller.ingress-nginx.svc.cluster.local"
litellm_faig_backend_base_path: /v1/passthrough
litellm_faig_backend_base_url: "{{ faig_internal_base_url }}{{ litellm_faig_backend_base_path }}"
litellm_faig_backend_api_key: "{{ fortiaigate_test_api_key | default('not-used', true) }}"
litellm_instruction_debug: false
litellm_models:
  - name: "{{ litellm_passthrough_model_alias }}"
    provider_model: "bedrock/{{ litellm_effective_bedrock_model_id | default(litellm_bedrock_fallback_model_id) }}"
    aws_region_name: "{{ litellm_effective_bedrock_region | default(aws_region | default('us-east-1')) }}"
    instruction_profile: passthrough
  - name: "{{ litellm_demo_a_model_alias }}"
    provider_model: "bedrock/{{ litellm_effective_bedrock_model_id | default(litellm_bedrock_fallback_model_id) }}"
    aws_region_name: "{{ litellm_effective_bedrock_region | default(aws_region | default('us-east-1')) }}"
    instruction_profile: demo-a
  - name: "{{ litellm_demo_b_model_alias }}"
    provider_model: "bedrock/{{ litellm_effective_bedrock_model_id | default(litellm_bedrock_fallback_model_id) }}"
    aws_region_name: "{{ litellm_effective_bedrock_region | default(aws_region | default('us-east-1')) }}"
    instruction_profile: demo-b
  - name: "{{ litellm_demo_a_faig_be_model_alias }}"
    provider_model: "openai/{{ litellm_faig_backend_downstream_model }}"
    api_base: "{{ litellm_faig_backend_base_url }}"
    api_key: "{{ litellm_faig_backend_api_key }}"
    instruction_profile: demo-a
  - name: "{{ litellm_demo_b_faig_be_model_alias }}"
    provider_model: "openai/{{ litellm_faig_backend_downstream_model }}"
    api_base: "{{ litellm_faig_backend_base_url }}"
    api_key: "{{ litellm_faig_backend_api_key }}"
    instruction_profile: demo-b

chatbot_instruction_root: "{{ playbook_dir }}/../../chatbot/instructions"
chatbot_instruction_examples_root: "{{ chatbot_instruction_root }}/examples"
chatbot_instruction_local_root: "{{ chatbot_instruction_root }}/local"
chatbot_instruction_profile_files:
  demo_a:
    example_path: "{{ chatbot_instruction_examples_root }}/HR-bot.instructions.txt"
    local_path: "{{ chatbot_instruction_local_root }}/demo-a/instructions.txt"
  demo_b:
    example_path: "{{ chatbot_instruction_examples_root }}/fastfood-bot.instructions.txt"
    local_path: "{{ chatbot_instruction_local_root }}/demo-b/instructions.txt"
  frontend:
    example_path: "{{ chatbot_instruction_examples_root }}/chatbot-frontend.instructions.txt"
    local_path: "{{ chatbot_instruction_local_root }}/frontend/instructions.txt"

litellm_instruction_profile_source_path: "{{ chatbot_instruction_profile_files.demo_a.local_path }}"
litellm_default_instruction_profile: passthrough
litellm_instruction_profile_injection_position: prepend
litellm_model_instruction_profiles: {}
litellm_instruction_profiles:
  - name: passthrough
    enabled: false
    position: prepend
    instruction: "No backend instruction injection for passthrough model aliases."
  - name: demo-a
    enabled: true
    position: "{{ litellm_instruction_profile_injection_position }}"
    source_path: "{{ litellm_instruction_profile_source_path }}"
  - name: demo-b
    enabled: true
    position: "{{ litellm_instruction_profile_injection_position }}"
    source_path: "{{ chatbot_instruction_profile_files.demo_b.local_path }}"

litellm_internal_base_url: "http://{{ litellm_release_name }}.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_service_port }}/v1"
litellm_faig_base_path: /v1/passthrough
litellm_faig_base_url: "{{ faig_internal_base_url }}{{ litellm_faig_base_path }}"
