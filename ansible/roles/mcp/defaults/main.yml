---
mcp_enabled: true
mcp_namespace: mcp
mcp_release_name: mcp-demo
mcp_chart_local_path: "{{ playbook_dir }}/../../mcp/chart"
mcp_chart_remote_root: "/home/{{ ansible_user }}/tmp/mcp-chart"
mcp_values_remote_path: "/home/{{ ansible_user }}/tmp/mcp-values.yaml"
mcp_tools_data_local_path: "{{ mcp_chart_local_path }}/files/tools.json"
mcp_service_type: NodePort
mcp_service_port: 8000
mcp_node_port: "{{ demo_mcp_http_port | default(30084) }}"
mcp_container_port: 8000
mcp_image_repository: python
mcp_image_tag: "3.12-slim"
mcp_image_pull_policy: IfNotPresent
mcp_helm_wait: false
mcp_helm_timeout: 180s
mcp_wait_for_rollout: true
mcp_internal_base_url: "http://{{ mcp_release_name }}.{{ mcp_namespace }}.svc.cluster.local:{{ mcp_service_port }}"

# Optional read-only FortiGate tools. The MCP server reports these tools as
# disabled unless Ansible can build a Kubernetes Secret from the Phase 6
# read-only API account token.
mcp_fortigate_tools_enabled: true
mcp_fortigate_terraform_dir: "{{ (playbook_dir + '/../../terraform/aws-fortigate') | realpath }}"
mcp_fortigate_api_secret_file: "{{ (playbook_dir + '/../secrets/fortigate_api.generated.yml') | realpath }}"
mcp_fortigate_api_account_name: "{{ fortigate_readonly_api_account_name | default('faig-readonly-api') }}"
# Leave empty to discover FortiGate port1 private IP from terraform/aws-fortigate.
# Override when the MCP server should target a different management URL.
mcp_fortigate_base_url: ""
mcp_fortigate_admin_port: "{{ fortigate_admin_port | default(8443) }}"
mcp_fortigate_api_token: ""
mcp_fortigate_vdom: "{{ fortigate_vdom | default('root') }}"
mcp_fortigate_verify_tls: false
mcp_fortigate_timeout_seconds: 8
mcp_fortigate_k8s_secret_name: fortigate-readonly-api
