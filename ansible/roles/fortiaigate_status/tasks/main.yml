---
- name: Get FortiAIGate Helm release status
  ansible.builtin.command:
    argv:
      - helm
      - status
      - "{{ fortiaigate_release_name }}"
      - -n
      - "{{ fortiaigate_namespace }}"
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
  changed_when: false
  failed_when: false
  register: fortiaigate_status_helm
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_helm.stdout_lines

- name: Get FortiAIGate pod readiness summary
  ansible.builtin.shell: |
    set -euo pipefail
    /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get pods -n {{ fortiaigate_namespace }} -o json \
      | /usr/bin/python3 -c '
    import json
    import sys

    data = json.load(sys.stdin)
    pods = data.get("items", [])
    problems = []
    ready_count = 0

    for pod in pods:
        metadata = pod.get("metadata", {})
        status = pod.get("status", {})
        name = metadata.get("name", "<unknown>")
        phase = status.get("phase", "Unknown")
        conditions = status.get("conditions", [])
        ready = phase == "Succeeded" or any(
            condition.get("type") == "Ready" and condition.get("status") == "True"
            for condition in conditions
        )
        waiting_reasons = []
        for container_status in status.get("containerStatuses", []):
            state = container_status.get("state", {})
            waiting = state.get("waiting")
            if waiting:
                reason = waiting.get("reason", "Waiting")
                message = waiting.get("message", "")
                waiting_reasons.append(reason if not message else f"{reason}: {message}")
        if ready and phase in ("Running", "Succeeded"):
            ready_count += 1
            continue
        detail = f"{name}: phase={phase}, ready={ready}"
        if waiting_reasons:
            detail = detail + ", waiting=" + "; ".join(waiting_reasons)
        problems.append(detail)

    result = {
        "ready": bool(pods) and ready_count == len(pods),
        "ready_count": ready_count,
        "total_count": len(pods),
        "problems": problems,
    }
    print(json.dumps(result))
    '
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  register: fortiaigate_status_pod_summary_raw
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_pod_summary_raw.stdout

- name: Get FortiAIGate pod age table
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - get
      - pods
      - -n
      - "{{ fortiaigate_namespace }}"
      - --no-headers
  changed_when: false
  failed_when: false
  register: fortiaigate_status_pod_table
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_pod_table.stdout_lines

- name: Get NVIDIA GPU status
  ansible.builtin.command:
    argv:
      - nvidia-smi
  changed_when: false
  failed_when: false
  register: fortiaigate_status_nvidia_smi
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_nvidia_smi.stdout_lines

- name: Set NVIDIA GPU status summary
  ansible.builtin.set_fact:
    fortiaigate_status_gpu_summary: >-
      {{
        ['nvidia-smi: available']
        if fortiaigate_status_nvidia_smi.rc == 0
        else ['nvidia-smi failed: ' ~ (fortiaigate_status_nvidia_smi.stderr | default('unknown error'))]
      }}
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_gpu_summary

- name: Set FortiAIGate pod summary fact
  ansible.builtin.set_fact:
    fortiaigate_status_pod_summary: "{{ fortiaigate_status_pod_summary_raw.stdout | from_json }}"
  when: fortiaigate_status_pod_summary_raw.rc == 0
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_pod_summary

- name: Set FortiAIGate pod summary error fact
  ansible.builtin.set_fact:
    fortiaigate_status_pod_summary:
      ready: false
      ready_count: 0
      total_count: 0
      problems:
        - "kubectl failed: {{ fortiaigate_status_pod_summary_raw.stderr | default('unknown error') }}"
  when: fortiaigate_status_pod_summary_raw.rc != 0
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_pod_summary

- name: Set FortiAIGate status host fact
  ansible.builtin.set_fact:
    fortiaigate_status_login_host: >-
      {{
        fortiaigate_ingress_host
        if (fortiaigate_ingress_host is defined and fortiaigate_ingress_host | length > 0)
        else (
          public_ip
          if (public_ip is defined and public_ip | default('', true) | length > 0)
          else (ansible_host | default(inventory_hostname))
        )
      }}
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_login_host

- name: Set FortiAIGate status classification
  ansible.builtin.set_fact:
    fortiaigate_status_state: >-
      {{
        'ERROR'
        if (fortiaigate_status_helm.rc != 0 or fortiaigate_status_pod_summary_raw.rc != 0)
        else ('READY' if fortiaigate_status_pod_summary.ready else 'NOT READY')
      }}
    fortiaigate_status_login_url: >-
      {{
        fortiaigate_status_login_url_override
        if fortiaigate_status_login_url_override | length > 0
        else 'https://' ~ fortiaigate_status_login_host ~ fortiaigate_status_ui_path
      }}
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_state

- name: Set FortiAIGate interpreted problem list
  ansible.builtin.set_fact:
    fortiaigate_status_problems: >-
      {{
        (
          ['helm status failed: ' ~ (fortiaigate_status_helm.stderr | default(fortiaigate_status_helm.stdout | default('unknown error')))]
          if fortiaigate_status_helm.rc != 0
          else []
        )
        + fortiaigate_status_pod_summary.problems
      }}
  # - ansible.builtin.debug:
  #     var: fortiaigate_status_problems

- name: Show raw FortiAIGate Helm release status when verbose
  ansible.builtin.debug:
    var: fortiaigate_status_helm.stdout_lines
  when: fortiaigate_status_verbose | bool

- name: Show raw FortiAIGate pod summary command output when verbose
  ansible.builtin.debug:
    var: fortiaigate_status_pod_summary_raw
  when: fortiaigate_status_verbose | bool

- name: Show raw NVIDIA status output when verbose
  ansible.builtin.debug:
    var: fortiaigate_status_nvidia_smi
  when: fortiaigate_status_verbose | bool

- name: Show NVIDIA GPU status
  ansible.builtin.debug:
    msg: "{{ fortiaigate_status_nvidia_smi.stdout_lines if fortiaigate_status_nvidia_smi.rc == 0 else fortiaigate_status_gpu_summary }}"

- name: Fail when FortiAIGate status data collection failed
  ansible.builtin.fail:
    msg: "{{ fortiaigate_status_problems | join(' | ') }}"
  when: fortiaigate_status_state == "ERROR"

- name: Show FortiAIGate status summary
  ansible.builtin.debug:
    msg:
      - "FortiAIGate status: {{ fortiaigate_status_state }}"
      - "Helm release: {{ 'present' if fortiaigate_status_helm.rc == 0 else 'error/not found' }}"
      - "Pods ready: {{ fortiaigate_status_pod_summary.ready_count }}/{{ fortiaigate_status_pod_summary.total_count }}"
      - "Pods (NAME READY STATUS RESTARTS AGE): {{ fortiaigate_status_pod_table.stdout_lines | default([]) | join('; ') if fortiaigate_status_pod_table.stdout_lines | default([]) | length > 0 else 'none' }}"
      - "NVIDIA GPU: {{ fortiaigate_status_gpu_summary | join(' | ') }}"
      - "Login URL: {{ fortiaigate_status_login_url }}"
      - "Problems: {{ fortiaigate_status_problems | join(' | ') if fortiaigate_status_problems | length > 0 else 'none' }}"
