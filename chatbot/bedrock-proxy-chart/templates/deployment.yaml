apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "direct-bedrock-proxy.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "direct-bedrock-proxy.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "direct-bedrock-proxy.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "direct-bedrock-proxy.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: litellm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/litellm/config.yaml
            - --host
            - 0.0.0.0
            - --port
            - "{{ .Values.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: AWS_REGION_NAME
              value: {{ .Values.bedrock.region | quote }}
            - name: AWS_REGION
              value: {{ .Values.bedrock.region | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.bedrock.region | quote }}
            - name: AWS_EC2_METADATA_DISABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "direct-bedrock-proxy.name" . }}
