apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm-demo.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "litellm-demo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  litellm-master-key: {{ .Values.litellm.masterKey | quote }}
  ui-username: {{ .Values.litellm.uiUsername | quote }}
  ui-password: {{ .Values.litellm.uiPassword | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  database-url: {{ printf "postgresql://%s:%s@%s:5432/%s" .Values.postgres.username .Values.postgres.password (include "litellm-demo.postgresName" .) .Values.postgres.database | quote }}

