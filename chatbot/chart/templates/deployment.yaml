apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatbot-demo.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "chatbot-demo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "chatbot-demo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "chatbot-demo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/chatbot-app: {{ .Values.chatbot.appChecksum | quote }}
    spec:
{{- if .Values.image.pullSecrets }}
      imagePullSecrets:
{{- range .Values.image.pullSecrets }}
        - name: {{ .name }}
{{- end }}
{{- end }}
      containers:
        - name: chatbot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          env:
            - name: CHATBOT_DIRECT_BASE_URL
              value: {{ .Values.chatbot.directBaseUrl | quote }}
            - name: CHATBOT_DIRECT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatbot-demo.name" . }}
                  key: chatbot-direct-api-key
            - name: CHATBOT_FAIG_BASE_URL
              value: {{ .Values.chatbot.faigBaseUrl | quote }}
            - name: CHATBOT_FAIG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatbot-demo.name" . }}
                  key: chatbot-faig-api-key
            - name: CHATBOT_FAIG_STATIC_ROUTE
              value: {{ .Values.chatbot.faigStaticRoute | quote }}
            - name: CHATBOT_FAIG_STATIC_ROUTES_JSON
              value: {{ .Values.chatbot.faigStaticRoutesJson | quote }}
            - name: CHATBOT_FAIG_HEADER_ROUTE
              value: {{ .Values.chatbot.faigHeaderRoute | quote }}
            - name: CHATBOT_FAIG_HEADER_ROUTES_JSON
              value: {{ .Values.chatbot.faigHeaderRoutesJson | quote }}
            - name: CHATBOT_FAIG_MODEL_ROUTE_HEADER_NAME
              value: {{ .Values.chatbot.faigModelRouteHeaderName | quote }}
            - name: CHATBOT_MODEL
              value: {{ .Values.chatbot.model | quote }}
            - name: CHATBOT_MODEL_OPTIONS
              value: {{ .Values.chatbot.modelOptions | quote }}
            - name: CHATBOT_PAGE_TITLE
              value: {{ .Values.chatbot.pageTitle | quote }}
            - name: CHATBOT_HEADER_TITLE
              value: {{ .Values.chatbot.headerTitle | quote }}
            - name: CHATBOT_FRONTEND_SYSTEM_PROMPT
              value: {{ .Values.chatbot.frontendSystemPrompt | quote }}
            - name: CHATBOT_TEMPERATURE
              value: {{ .Values.chatbot.temperature | quote }}
            - name: CHATBOT_MAX_TOKENS
              value: {{ .Values.chatbot.maxTokens | quote }}
            - name: CHATBOT_STREAMING
              value: {{ .Values.chatbot.streaming | quote }}
            - name: CHATBOT_VERIFY_TLS
              value: {{ .Values.chatbot.verifyTls | quote }}
            - name: CHATBOT_MCP_ENABLED
              value: {{ .Values.chatbot.mcpEnabled | quote }}
            - name: CHATBOT_MCP_DIRECT_BASE_URL
              value: {{ .Values.chatbot.mcpDirectBaseUrl | quote }}
            - name: CHATBOT_MCP_FORTIWEB_BASE_URL
              value: {{ .Values.chatbot.mcpFortiwebBaseUrl | quote }}
            - name: CHATBOT_MCP_DEFAULT_PATH
              value: {{ .Values.chatbot.mcpDefaultPath | quote }}
            - name: CHATBOT_MCP_TIMEOUT_SECONDS
              value: {{ .Values.chatbot.mcpTimeoutSeconds | quote }}
            - name: CHATBOT_MCP_VERIFY_TLS
              value: {{ .Values.chatbot.mcpVerifyTls | quote }}
            - name: CHATBOT_MCP_MAX_TOOL_ROUNDS
              value: {{ .Values.chatbot.mcpMaxToolRounds | quote }}
            - name: CHATBOT_CONTEXT_MODE
              value: {{ .Values.chatbot.contextMode | quote }}
            - name: CHATBOT_CONTEXT_WINDOW
              value: {{ .Values.chatbot.contextWindow | quote }}
            - name: CHATBOT_CONTEXT_SUMMARY_MAX_CHARS
              value: {{ .Values.chatbot.contextSummaryMaxChars | quote }}
            - name: CHATBOT_CONTEXT_SUMMARY_MODEL
              value: {{ .Values.chatbot.contextSummaryModel | quote }}
            - name: CHATBOT_SHOW_CONTEXT
              value: {{ .Values.chatbot.showContext | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 6
