nameOverride: chatbot

image:
  repository: fortiaigate/chatbot-basic
  tag: local
  pullPolicy: Always
  pullSecrets: []

service:
  type: NodePort
  port: 80
  nodePort: 30081

containerPort: 8501

chatbot:
  appChecksum: ""
  directBaseUrl: ""
  directApiKey: not-used
  faigBaseUrl: ""
  faigApiKey: not-used
  faigStaticRoute: demo-a
  faigStaticRoutesJson: ""
  faigHeaderRoute: demo-a
  faigHeaderRoutesJson: ""
  faigModelRouteHeaderName: X-FAIG-Model-Route
  model: auto
  modelOptions: ""
  pageTitle: AI Chatbot
  headerTitle: AI Chatbot
  frontendSystemPrompt: ""
  temperature: "0.0"
  maxTokens: "4096"
  streaming: "false"
  verifyTls: "false"
  mcpEnabled: "false"
  mcpDirectBaseUrl: "http://mcp-demo.mcp.svc.cluster.local:8000"
  mcpFortiwebBaseUrl: ""
  mcpDefaultPath: direct
  mcpTimeoutSeconds: "10"
  mcpVerifyTls: "false"
  mcpMaxToolRounds: "3"
  contextMode: recent
  contextWindow: "8"
  contextSummaryMaxChars: "1500"
  contextSummaryModel: pass-bedrock
  showContext: "false"

instructions:
  content: "You are a helpful AI assistant."
  llamaContent: ""

ingress:
  enabled: false
  className: nginx
  host: ""
  tls:
    enabled: false
    secretName: ""
