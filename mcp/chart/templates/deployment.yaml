apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-demo.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "mcp-demo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mcp-demo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: {{ include "mcp-demo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mcp-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - /app/server/server.py
          env:
            - name: MCP_DATA_PATH
              value: /app/data/tools.json
            - name: MCP_DOCUMENT_INDEX_PATH
              value: /app/documents/documents.json
            - name: MCP_DOCUMENT_ROOT
              value: /app/documents
            - name: MCP_LISTEN_PORT
              value: "{{ .Values.containerPort }}"
            - name: MCP_FORTIGATE_ENABLED
              value: "{{ .Values.fortigate.enabled }}"
{{- if and .Values.fortigate.enabled .Values.fortigate.secretName }}
            - name: MCP_FORTIGATE_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fortigate.secretName }}
                  key: base_url
                  optional: true
            - name: MCP_FORTIGATE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fortigate.secretName }}
                  key: api_token
                  optional: true
            - name: MCP_FORTIGATE_VDOM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fortigate.secretName }}
                  key: vdom
                  optional: true
            - name: MCP_FORTIGATE_VERIFY_TLS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fortigate.secretName }}
                  key: verify_tls
                  optional: true
            - name: MCP_FORTIGATE_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fortigate.secretName }}
                  key: timeout_seconds
                  optional: true
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: mcp-config
              mountPath: /app/server/server.py
              subPath: server.py
              readOnly: true
            - name: mcp-config
              mountPath: /app/data/tools.json
              subPath: tools.json
              readOnly: true
            - name: mcp-config
              mountPath: /app/documents
              readOnly: true
      volumes:
        - name: mcp-config
          configMap:
            name: {{ include "mcp-demo.name" . }}
